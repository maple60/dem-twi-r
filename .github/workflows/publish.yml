on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gdal-bin libabsl-dev libgdal-dev libpng-dev libudunits2-dev pandoc

      - name: Restore R dependencies
        run: Rscript -e 'renv::restore(prompt = FALSE)'

      - name: Install WhiteboxTools
        run: Rscript -e 'whitebox::install_whitebox()'

      - name: Render site
        run: quarto render

      - name: Export Shinylive demo
        run: Rscript scripts/build-shinylive.R app-shinylive _site/app

      - name: Render and publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
